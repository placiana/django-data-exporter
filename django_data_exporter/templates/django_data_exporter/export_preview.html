<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualización de Exportación - {{ filename }}</title>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --border-color: #dee2e6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 20px;
            color: #333;
        }
        .export-panel {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-outline { border-color: var(--border-color); background: white; color: #333; }
        .btn:hover { opacity: 0.9; }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background-color: #f1f1f1;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
        }
        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        tr:hover { background-color: #f8f9fa; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h2>Previsualización: {{ filename }}</h2>

    <div class="export-panel">
        <div class="btn-group">
            <button id="copy-btn" class="btn btn-outline" title="Copiar como TSV (Excel)">
                📋 Copiar al Portapapeles
            </button>
        </div>
        
        <div class="btn-group">
            <a href="?export=csv" class="btn btn-secondary">📄 CSV</a>
            <a href="?export=xlsx" class="btn btn-success">📊 XLSX</a>
            <a href="?export=pdf" class="btn btn-primary">📕 PDF</a>
        </div>
    </div>

    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    {% for item in header %}
                        <th>{{ item }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in preview_data %}
                    <tr>
                        {% for cell in row %}
                            <td>{{ cell }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div id="toast" class="toast">¡Copiado al portapapeles!</div>

    <script src="{% static 'django_data_exporter/js/exporter.js' %}"></script>
    <script>
        // Inline fallback if static is not found or for quick testing
        document.addEventListener('DOMContentLoaded', function() {
            const copyBtn = document.getElementById('copy-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', function() {
                    copyTableToClipboard('data-table');
                });
            }
        });

        function copyTableToClipboard(tableId) {
            const table = document.getElementById(tableId);
            let tsv = [];
            
            // Get headers
            const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText.trim());
            tsv.push(headers.join('\t'));
            
            // Get rows
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = Array.from(row.querySelectorAll('td')).map(td => td.innerText.trim());
                tsv.push(cells.join('\t'));
            });
            
            const fullTsv = tsv.join('\n');
            
            navigator.clipboard.writeText(fullTsv).then(() => {
                showToast();
            }).catch(err => {
                console.error('Error al copiar: ', err);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
