{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsualización de Exportación - {{ filename }}</title>
    <style>
        :root {
            --dark-color: #1e293b;
            --dark-hover: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --border-color: #cbd5e1;
            --table-border: #e2e8f0;
            --table-header-bg: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            background-color: var(--bg-body);
            line-height: 1.5;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
        }

        h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filename-hint {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .actions-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .export-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 3px;
            border: 1px solid var(--dark-color);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 11px;
            transition: all 0.1s ease;
            background: white;
            color: var(--dark-color);
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--dark-color);
            color: white;
        }

        .table-wrapper {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background-color: var(--table-header-bg);
            text-align: left;
            padding: 10px 12px;
            font-weight: 700;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--table-border);
            text-transform: uppercase;
            font-size: 10px;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--table-border);
            border-right: 1px solid var(--table-border);
            color: #334155;
        }

        th:last-child, td:last-child {
            border-right: none;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--dark-color);
            color: white;
            padding: 10px 20px;
            border-radius: 2px;
            display: none;
            z-index: 1000;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div>
            <h2>{{ filename }}</h2>
        </div>
    </div>

    <div class="actions-container">
        <div>
            <button id="copy-btn" class="btn">Copiar al portapapeles</button>
        </div>
        
        <div class="export-section">
            <span class="section-label">Exportar como:</span>
            <div class="btn-group">
                <a href="?export=csv" class="btn">CSV</a>
                <a href="?export=xlsx" class="btn">Excel</a>
                <a href="?export=pdf" class="btn">PDF</a>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                        {% for item in header %}
                            <th>{{ item }}</th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody>
                    {% for row in preview_data %}
                        <tr>
                            {% for cell in row %}
                                <td>{{ cell }}</td>
                            {% endfor %}
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast">COPIADO AL PORTAPAPELES</div>

    <script src="{% static 'django_data_exporter/js/exporter.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const copyBtn = document.getElementById('copy-btn');
            if (copyBtn) {
                copyBtn.addEventListener('click', function() {
                    copyTableToClipboard('data-table');
                });
            }
        });

        function copyTableToClipboard(tableId) {
            const table = document.getElementById(tableId);
            let tsv = [];
            
            const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText.trim());
            tsv.push(headers.join('\t'));
            
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const cells = Array.from(row.querySelectorAll('td')).map(td => td.innerText.trim());
                tsv.push(cells.join('\t'));
            });
            
            const fullTsv = tsv.join('\n');
            
            navigator.clipboard.writeText(fullTsv).then(() => {
                showToast();
            }).catch(err => {
                console.error('Error al copiar: ', err);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
